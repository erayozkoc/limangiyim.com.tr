server {
    listen 80;
    listen [::]:80;
    server_name limangiyim.com.tr www.limangiyim.com.tr;
    return 301 https://www.limangiyim.com.tr$request_uri;
}

server {
    listen 443 ssl;
    server_name limangiyim.com.tr;
    ssl_certificate /etc/letsencrypt/live/limangiyim.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/limangiyim.com.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.limangiyim.com.tr$request_uri;
}

server {
    listen 443 ssl;
    server_name www.limangiyim.com.tr;
    ssl_certificate /etc/letsencrypt/live/limangiyim.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/limangiyim.com.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/ceranco/limangiyim.com.tr;
    index index.html;
    error_page 404 /404;

    location ~ /\. {
        deny all;
    }
    location = /index.html {
        return 301 /;
    }
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
    location ~* \.(jpg|jpeg|png|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/html text/css text/plain application/javascript application/json image/svg+xml;
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
}
